#APi and databse imporvment in same network in docker so can communnicate
version: '3.9'

services:
  postgres:
    image: postgres:16

    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
        
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: . # will mkae docker image from dockerfile in rencetly file
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
              ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=postgres;Username=postgres;Password=admin"
 

volumes:
  pgdata: